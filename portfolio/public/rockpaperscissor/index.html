<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - Premium Edition</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- Main Card -->
        <main class="game-card">
            <header class="game-header">
                <h1>Rock Paper Scissors <span class="header-emojis">✊✋✌️</span></h1>
                <div class="round-badge">Round <span id="round-count">1</span></div>
            </header>

            <!-- Scoreboard -->
            <section class="scoreboard">
                <div class="score-box player-score">
                    <span class="score-label">YOU</span>
                    <span id="player-score" class="score-value">0</span>
                </div>
                <div class="score-box draw-score">
                    <span class="score-label">TIES</span>
                    <span id="draw-score" class="score-value">0</span>
                </div>
                <div class="score-box computer-score">
                    <span class="score-label">COMP</span>
                    <span id="computer-score" class="score-value">0</span>
                </div>
            </section>

            <!-- Showdown Arena -->
            <section class="arena">
                <div class="hand-display player-hand" id="player-hand-display">
                    <div class="hand-icon-wrapper">
                        <span id="player-choice-icon" class="hand-icon">❔</span>
                    </div>
                    <span class="hand-label">You Chose</span>
                </div>

                <div class="vs-divider">VS</div>

                <div class="hand-display computer-hand" id="computer-hand-display">
                    <div class="hand-icon-wrapper">
                        <span id="computer-choice-icon" class="hand-icon">❔</span>
                    </div>
                    <span class="hand-label">Computer Chose</span>
                </div>
            </section>

            <!-- Feedback Message -->
            <section class="message-area">
                <p id="game-message" class="game-message">Make your move!</p>
            </section>

            <!-- Input Choices -->
            <section class="choices-container">
                <button class="choice-btn" data-choice="rock" aria-label="Rock">
                    <span class="choice-emoji">✊</span>
                    <span class="choice-text">Rock</span>
                </button>
                <button class="choice-btn" data-choice="paper" aria-label="Paper">
                    <span class="choice-emoji">✋</span>
                    <span class="choice-text">Paper</span>
                </button>
                <button class="choice-btn" data-choice="scissors" aria-label="Scissors">
                    <span class="choice-emoji">✌️</span>
                    <span class="choice-text">Scissors</span>
                </button>
            </section>

            <!-- Actions -->
            <footer class="game-footer">
                <button id="reset-btn" class="reset-btn">Reset Game</button>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
