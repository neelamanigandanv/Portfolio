<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Task - Dozen Board</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Font Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="bg-[#0B1528] min-h-screen flex flex-col text-gray-100">

  <!-- Header -->
  <header class="h-20 bg-[#CBB598] border-b border-[#BCA483] px-8 flex items-center justify-between shrink-0">
    <div class="flex items-center space-x-3">
      <!-- Unique Hexagonal Logo -->
      <svg class="w-8 h-8 text-[#0B1528]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L20.66 7V17L12 22L3.34 17V7L12 2Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M12 8V16M8 12H16" stroke="#38271A" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="flex items-center">
      <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-white ring-2 ring-[#FAF5EC] object-cover shadow-sm">
    </div>
  </header>

  <!-- Edit Task Form Container -->
  <main class="flex-1 flex items-center justify-center p-6">
    <div class="bg-[#CBB598] rounded-3xl p-8 max-w-md w-full shadow-2xl border border-[#BCA483] text-[#0B1528]">
      <h2 class="text-2xl font-bold text-[#0B1528] mb-6 flex items-center space-x-2">
        <i class="fa-regular fa-pen-to-square"></i>
        <span>Edit Task Details</span>
      </h2>
      
      <form id="editTaskForm" class="space-y-5">
        <!-- Task Title -->
        <div>
          <label for="taskTitle" class="block text-xs font-bold text-[#38271A] tracking-wider mb-2">Task Title</label>
          <input type="text" id="taskTitle" required placeholder="Rename task..." class="w-full px-4 py-3 bg-[#FAF5EC] border border-[#DFD5C4] rounded-xl text-sm focus:outline-none focus:bg-white focus:border-[#0B1528] transition-colors text-[#0B1528] placeholder-slate-400">
        </div>

        <!-- Column Status Selector -->
        <div>
          <label for="taskStatus" class="block text-xs font-bold text-[#38271A] tracking-wider mb-2">Column Status</label>
          <select id="taskStatus" class="w-full px-4 py-3 bg-[#FAF5EC] border border-[#DFD5C4] rounded-xl text-sm focus:outline-none focus:bg-white focus:border-[#0B1528] transition-colors text-[#0B1528]">
            <option value="not-started">Not Started</option>
            <option value="in-progress">In Progress</option>
            <option value="in-review">In Review</option>
            <option value="complete">Complete</option>
          </select>
        </div>

        <!-- Tags Input -->
        <div>
          <label for="taskTags" class="block text-xs font-bold text-[#38271A] tracking-wider mb-2">Tags (comma separated)</label>
          <input type="text" id="taskTags" placeholder="e.g. Epic 1, UI, Backend" class="w-full px-4 py-3 bg-[#FAF5EC] border border-[#DFD5C4] rounded-xl text-sm focus:outline-none focus:bg-white focus:border-[#0B1528] transition-colors text-[#0B1528] placeholder-slate-400">
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center justify-end space-x-3 pt-4">
          <a href="welcome.html" class="px-5 py-2.5 border border-[#DFD5C4] rounded-xl text-sm font-semibold text-[#0B1528] bg-[#FAF5EC] hover:bg-[#F2ECE0] transition-colors text-center">Cancel</a>
          <button type="submit" class="bg-[#0B1528] hover:bg-[#1E3154] text-white font-bold px-6 py-2.5 rounded-xl text-sm transition-all active:scale-95">Save Changes</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Get URL params
      const urlParams = new URLSearchParams(window.location.search);
      const taskId = urlParams.get('id');

      if (!taskId) {
        alert('No task specified.');
        window.location.href = 'welcome.html';
        return;
      }

      // Load tasks
      let tasks = JSON.parse(localStorage.getItem('boardTasks')) || [];
      const task = tasks.find(t => t.id === taskId);

      if (!task) {
        alert('Task not found.');
        window.location.href = 'welcome.html';
        return;
      }

      // Populate fields
      document.getElementById('taskTitle').value = task.title;
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('taskTags').value = task.tags.join(', ');

      // Handle submit
      const editTaskForm = document.getElementById('editTaskForm');
      editTaskForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const newTitle = document.getElementById('taskTitle').value.trim();
        const newStatus = document.getElementById('taskStatus').value;
        const tagsInput = document.getElementById('taskTags').value;

        if (newTitle === '') return;

        task.title = newTitle;
        task.status = newStatus;
        task.tags = tagsInput ? tagsInput.split(',').map(t => t.trim()).filter(t => t) : ['Task'];

        // Save
        localStorage.setItem('boardTasks', JSON.stringify(tasks));

        // Go back
        window.location.href = 'welcome.html';
      });
    });
  </script>
</body>
</html>
