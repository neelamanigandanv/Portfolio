<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Sale Admin</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="login.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#60A5FA',
              DEFAULT: '#3B82F6',
              dark: '#1D4ED8',
            }
          }
        }
      }
    }
  </script>
</head>

<body
  class="bg-gradient-to-br from-[#1E40AF] via-[#3B82F6] to-[#60A5FA] min-h-screen flex items-center justify-center relative overflow-y-auto overflow-x-hidden p-4">

  <!-- Background Decorative Concentric Circles -->
  <div class="bg-circle-1 animate-pulse-subtle"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-circle-3 animate-pulse-subtle"></div>

  <!-- Reset Password Card Container -->
  <div
    class="bg-white rounded-3xl shadow-2xl p-8 md:p-12 max-w-md w-full relative z-10 transition-all duration-500 hover:shadow-[0_20px_50px_rgba(30,64,175,0.3)]">

    <!-- Top Decorative Blob -->
    <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-0 pointer-events-none opacity-60"></div>

    <div class="z-10 relative">
      <!-- Header -->
      <h2 class="text-3xl font-bold text-gray-800 tracking-tight mb-2">Reset Password</h2>
      <p id="resetSubtext" class="text-gray-400 text-sm mb-8 leading-relaxed">
        Please enter your new password below.
      </p>

      <!-- Form -->
      <form id="resetForm" class="space-y-6" novalidate>
        <!-- New Password Field -->
        <div class="line-input-container">
          <label for="newPassword" class="line-input-label">New Password</label>
          <div class="relative">
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password"
              class="line-input pr-10 text-gray-700 focus:placeholder-transparent" required>
            <button type="button" id="toggleNewPassword"
              class="absolute right-0 bottom-2 text-gray-300 hover:text-blue-500 transition-colors focus:outline-none">
              <i class="fa-regular fa-eye-slash text-sm"></i>
            </button>
          </div>
          <p id="newPasswordError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Confirm Password Field -->
        <div class="line-input-container">
          <label for="confirmPassword" class="line-input-label">Confirm Password</label>
          <div class="relative">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password"
              class="line-input pr-10 text-gray-700 focus:placeholder-transparent" required>
            <button type="button" id="toggleConfirmPassword"
              class="absolute right-0 bottom-2 text-gray-300 hover:text-blue-500 transition-colors focus:outline-none">
              <i class="fa-regular fa-eye-slash text-sm"></i>
            </button>
          </div>
          <p id="confirmPasswordError" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Submit & Back to Login -->
        <div class="flex flex-col space-y-4 pt-4">
          <button type="submit" id="submitBtn"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 rounded-md shadow-lg shadow-blue-500/20 hover:shadow-blue-500/35 active:scale-95 transition-all duration-200 flex items-center justify-center space-x-2">
            <span id="btnText">Confirm Reset</span>
            <svg id="btnSpinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg"
              fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
          </button>

          <a href="login.html"
            class="text-center text-sm font-semibold text-gray-400 hover:text-blue-500 transition-colors py-2">
            Back to Sign In
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification Toast -->
  <div id="toast"
    class="fixed top-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center space-x-3 transform -translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
    <div id="toastIconContainer" class="p-1.5 rounded-lg text-white"></div>
    <div>
      <h4 id="toastTitle" class="font-bold text-sm leading-tight text-white"></h4>
      <p id="toastMessage" class="text-xs text-slate-300"></p>
    </div>
  </div>

  <!-- JS Logic Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resetForm = document.getElementById('resetForm');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const newPasswordError = document.getElementById('newPasswordError');
      const confirmPasswordError = document.getElementById('confirmPasswordError');

      const toggleNewPassword = document.getElementById('toggleNewPassword');
      const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

      // Populate Reset Email Subtitle
      const resetEmail = localStorage.getItem('resetEmail');
      if (resetEmail) {
        document.getElementById('resetSubtext').innerHTML = `Please enter a new password for <span class="text-blue-500 font-semibold">${resetEmail}</span> below.`;
      }

      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');

      const toast = document.getElementById('toast');
      const toastTitle = document.getElementById('toastTitle');
      const toastMessage = document.getElementById('toastMessage');
      const toastIconContainer = document.getElementById('toastIconContainer');

      // Toggle helper
      const setupToggle = (button, input) => {
        button.addEventListener('click', () => {
          const isPassword = input.getAttribute('type') === 'password';
          input.setAttribute('type', isPassword ? 'text' : 'password');
          const icon = button.querySelector('i');
          if (isPassword) {
            icon.className = 'fa-regular fa-eye text-sm text-blue-500';
          } else {
            icon.className = 'fa-regular fa-eye-slash text-sm text-gray-300';
          }
        });
      };

      setupToggle(toggleNewPassword, newPasswordInput);
      setupToggle(toggleConfirmPassword, confirmPasswordInput);

      let toastTimeout;
      const showToast = (type, title, message) => {
        clearTimeout(toastTimeout);
        if (type === 'success') {
          toastIconContainer.className = 'p-1.5 rounded-lg text-white bg-green-500';
          toastIconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-base"></i>';
        } else {
          toastIconContainer.className = 'p-1.5 rounded-lg text-white bg-red-500';
          toastIconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-base"></i>';
        }
        toastTitle.textContent = title;
        toastMessage.textContent = message;
        toast.className = 'fixed top-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center space-x-3 transform transition-all duration-300 z-50 pointer-events-none animate-slide-down';
        toastTimeout = setTimeout(() => {
          toast.className = 'fixed top-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center space-x-3 transform -translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none';
        }, 4000);
      };

      resetForm.addEventListener('submit', (e) => {
        e.preventDefault();

        // Reset state
        newPasswordError.classList.add('hidden');
        confirmPasswordError.classList.add('hidden');
        newPasswordInput.classList.remove('border-red-500');
        confirmPasswordInput.classList.remove('border-red-500');

        const newPass = newPasswordInput.value;
        const confirmPass = confirmPasswordInput.value;
        let isValid = true;

        if (!newPass) {
          newPasswordError.textContent = 'Password field is required.';
          newPasswordError.classList.remove('hidden');
          newPasswordInput.classList.add('border-red-500');
          isValid = false;
        } else if (newPass.length < 6) {
          newPasswordError.textContent = 'Password must be at least 6 characters.';
          newPasswordError.classList.remove('hidden');
          newPasswordInput.classList.add('border-red-500');
          isValid = false;
        }

        if (!confirmPass) {
          confirmPasswordError.textContent = 'Please confirm your password.';
          confirmPasswordError.classList.remove('hidden');
          confirmPasswordInput.classList.add('border-red-500');
          isValid = false;
        } else if (newPass !== confirmPass) {
          confirmPasswordError.textContent = 'Passwords do not match.';
          confirmPasswordError.classList.remove('hidden');
          confirmPasswordInput.classList.add('border-red-500');
          isValid = false;
        }

        if (!isValid) return;

        // Loading state
        submitBtn.disabled = true;
        btnText.textContent = 'Resetting...';
        btnSpinner.classList.remove('hidden');

        setTimeout(() => {
          // Success - Identify account and update password
          const resetEmailVal = localStorage.getItem('resetEmail');
          const regEmailVal = localStorage.getItem('regEmail');

          if (resetEmailVal === 'neelamanigandanv2005@gmail.com') {
            localStorage.setItem('demoPassword', newPass);
          } else if (regEmailVal && resetEmailVal === regEmailVal) {
            localStorage.setItem('regPassword', newPass);
          }

          showToast('success', 'Reset Successful', 'Your password has been successfully updated.');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        }, 1500);
      });
    });
  </script>
</body>

</html>
